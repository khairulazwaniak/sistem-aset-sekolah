<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e0a4e"/>
      <stop offset="60%"  stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.98)"/>
      <stop offset="100%" stop-color="rgba(220,210,255,0.85)"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(196,181,253,0.75)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0.55)"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.92)"/>
      <stop offset="100%" stop-color="rgba(233,226,255,0.75)"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner glow top-left -->
  <ellipse cx="180" cy="160" rx="180" ry="100" fill="rgba(167,139,250,0.14)"/>

  <!-- ── Isometric box ── -->
  <g filter="url(#shadow)">
    <!-- Top face (diamond) -->
    <path d="M256 148 L390 218 L256 288 L122 218 Z" fill="url(#topFace)"/>

    <!-- Left face -->
    <path d="M122 218 L256 288 L256 392 L122 322 Z" fill="url(#leftFace)"/>

    <!-- Right face (main / brightest) -->
    <path d="M256 288 L390 218 L390 322 L256 392 Z" fill="url(#rightFace)"/>
  </g>

  <!-- Edge lines for crispness -->
  <path d="M256 148 L390 218 L256 288 L122 218 Z"
    fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  <line x1="256" y1="288" x2="256" y2="392"
    stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <line x1="122" y1="218" x2="122" y2="322"
    stroke="rgba(255,255,255,0.2)"  stroke-width="2"/>
  <line x1="390" y1="218" x2="390" y2="322"
    stroke="rgba(255,255,255,0.2)"  stroke-width="2"/>

  <!-- Tape ribbon — vertical on right face -->
  <path d="M323 232 L323 356" stroke="rgba(109,40,217,0.45)" stroke-width="18" stroke-linecap="square"/>

  <!-- Tape ribbon — diagonal across top face -->
  <path d="M256 148 L256 288" stroke="rgba(109,40,217,0.3)" stroke-width="14"/>

  <!-- Tape cross on top -->
  <path d="M174 183 L338 253" stroke="rgba(109,40,217,0.2)" stroke-width="8"/>

  <!-- Small sparkle accent — top right -->
  <circle cx="408" cy="122" r="24" fill="rgba(244,63,94,0.7)"/>
  <path d="M408 108 L412 118 L422 118 L414 125 L417 135 L408 129 L399 135 L402 125 L394 118 L404 118 Z"
    fill="rgba(255,255,255,0.95)"/>

  <!-- Tiny star — bottom right -->
  <circle cx="416" cy="396" r="13" fill="rgba(251,191,36,0.55)"/>
  <path d="M416 386 L418 392 L425 392 L419 396 L421 403 L416 399 L411 403 L413 396 L407 392 L414 392 Z"
    fill="rgba(255,255,255,0.85)"/>
</svg>
